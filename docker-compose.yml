services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anime-shop-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor      # vendor stays inside container
    environment:
      - PHP_OPCACHE_ENABLE=0      # disable opcache in dev so edits take effect immediately
    networks:
      - anime-shop

  nginx:
    image: nginx:1.25-alpine
    container_name: anime-shop-nginx
    restart: unless-stopped
    ports:
      - "8005:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - anime-shop

  mysql:
    image: mysql:8.0
    container_name: anime-shop-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-anime_shop}
      MYSQL_USER: ${DB_USERNAME:-anime_shop}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "3307:3306"               # 3307 on host to avoid clash with local MySQL
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - anime-shop

  phpmyadmin:
    image: phpmyadmin:5
    container_name: anime-shop-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - anime-shop

volumes:
  mysql-data:

networks:
  anime-shop:
    driver: bridge
