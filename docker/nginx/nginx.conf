# nginx.conf — production override for single-container Railway deployment
# Runs as root (supervisord is root); workers also run as root to avoid
# permission issues with /run/nginx, /var/lib/nginx temp dirs, and app files.

user root;
worker_processes auto;

# pid in /run (always exists on Alpine; avoids /run/nginx/ directory issue)
pid /run/nginx.pid;

error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /dev/stdout main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Virtual host configs generated at runtime by entrypoint.sh
    include /etc/nginx/http.d/*.conf;
}
